# Deploy file for Hostinger VPS — alien-proxy
# Uses network_mode: host (matching traefik + other services)
# Server.js is base64-encoded in the command line

services:
  alien-proxy:
    image: node:22-alpine
    restart: unless-stopped
    network_mode: host
    entrypoint: ["sh", "-c"]
    command:
      - "echo  | base64 -d>/tmp/s.js&&node /tmp/s.js"
    labels:
      - traefik.enable=true
      - traefik.http.routers.ap.rule=Host(`proxy.srv1158554.hstgr.cloud`)
      - traefik.http.routers.ap.entrypoints=websecure
      - traefik.http.routers.ap.tls.certresolver=letsencrypt
      - traefik.http.services.ap.loadbalancer.server.url=http://127.0.0.1:3000
